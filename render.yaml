# Blueprint Render — API NestJS (monorepo na raiz)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: hub-central-api
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run start:api
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES
        value: 7d
      - key: ADMIN_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
